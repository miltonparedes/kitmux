version: "2"

run:
  timeout: 5m
  tests: true

formatters:
  enable:
    - gofumpt
  settings:
    gofumpt:
      extra-rules: true

linters:
  default: standard
  enable:
    - copyloopvar
    - cyclop
    - dupl
    - dupword
    - durationcheck
    - errname
    - funlen
    - gochecknoinits
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - gosec
    - lll
    - maintidx
    - misspell
    - nestif
    - nilerr
    - prealloc
    - revive
    - unconvert
    - unparam
    - usestdlibvars
    - wastedassign
  settings:
    cyclop:
      max-complexity: 15
      package-average: 8.0
    dupl:
      threshold: 150
    funlen:
      lines: 100
      statements: 50
    gocognit:
      min-complexity: 20
    goconst:
      min-len: 5
      min-occurrences: 5
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      disabled-checks:
        - singleCaseSwitch
        - hugeParam        # Bubble Tea requires value receivers on Model
        - rangeValCopy     # Acceptable for small-to-medium structs
        - evalOrder        # returnToPalette pointer-receiver pattern is intentional
    gocyclo:
      min-complexity: 15
    gosec:
      excludes:
        - G204
    lll:
      line-length: 140
      tab-width: 4
    maintidx:
      under: 20
    nestif:
      min-complexity: 4
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-naming
        - name: error-return
        - name: error-strings
        - name: increment-decrement
        - name: indent-error-flow
        - name: range
        - name: receiver-naming
        - name: redefines-builtin-id
        - name: time-naming
        - name: unexported-return
        - name: var-declaration
  exclusions:
    rules:
      # Declarative registries are intentionally long
      - path: internal/views/palette/commands.go
        linters:
          - funlen
          - maintidx
      # Tests may be verbose / duplicative by nature
      - path: _test\.go
        linters:
          - cyclop
          - dupl
          - funlen
          - gocognit
          - gocyclo
          - lll
          - maintidx

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

output:
  formats:
    text:
      path: stdout
  sort-order:
    - linter
    - file
