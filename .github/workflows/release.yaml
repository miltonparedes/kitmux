name: Release
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Run tests
        run: go test -race ./...
      - name: Check install script
        run: |
          sh -n install.sh
          KITMUX_VERSION="${GITHUB_REF_NAME}" KITMUX_OS=darwin KITMUX_ARCH=x86_64 KITMUX_INSTALL_DRY_RUN=1 sh install.sh
          KITMUX_VERSION="${GITHUB_REF_NAME}" KITMUX_OS=darwin KITMUX_ARCH=arm64 KITMUX_INSTALL_DRY_RUN=1 sh install.sh
          KITMUX_VERSION="${GITHUB_REF_NAME}" KITMUX_OS=linux KITMUX_ARCH=x86_64 KITMUX_INSTALL_DRY_RUN=1 sh install.sh
          KITMUX_VERSION="${GITHUB_REF_NAME}" KITMUX_OS=linux KITMUX_ARCH=aarch64 KITMUX_INSTALL_DRY_RUN=1 sh install.sh
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
