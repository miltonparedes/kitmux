name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Run tests
        run: go test -race -coverprofile=coverage.out ./...
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10
          args: --timeout=5m ./...

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o /dev/null .

  installer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check install script
        run: |
          sh -n install.sh
          KITMUX_VERSION=v0.0.0-test KITMUX_OS=darwin KITMUX_ARCH=x86_64 KITMUX_INSTALL_DRY_RUN=1 sh install.sh
          KITMUX_VERSION=v0.0.0-test KITMUX_OS=darwin KITMUX_ARCH=arm64 KITMUX_INSTALL_DRY_RUN=1 sh install.sh
          KITMUX_VERSION=v0.0.0-test KITMUX_OS=linux KITMUX_ARCH=x86_64 KITMUX_INSTALL_DRY_RUN=1 sh install.sh
          KITMUX_VERSION=v0.0.0-test KITMUX_OS=linux KITMUX_ARCH=aarch64 KITMUX_INSTALL_DRY_RUN=1 sh install.sh
